<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.I.D. - Dossiê Final</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .painel-global { max-width: 1000px; margin: 0 auto; padding-bottom: 50px; }
        
        /* Cartão de Patente */
        .resumo-patente {
            background: rgba(0, 20, 0, 0.9); border: 4px double #00ff41;
            padding: 30px; text-align: center; margin-bottom: 40px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
        }
        .titulo-patente { font-size: 2.5rem; margin: 10px 0; text-transform: uppercase; font-weight: bold; text-shadow: 0 0 20px currentColor; }
        
        /* Stats Extras */
        .stats-extra {
            display: flex; justify-content: center; gap: 40px; margin-top: 20px; 
            border-top: 1px solid #333; padding-top: 15px; font-size: 0.9rem; color: #aaa;
        }

        /* Grid de Resumo dos Casos */
        .grid-historico { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        
        .card-caso { background: #0a0a0a; border: 1px solid #00ff41; border-radius: 6px; padding: 20px; }
        .card-caso h3 { margin-top: 0; border-bottom: 1px dashed #00ff41; padding-bottom: 10px; color: #ffff00; font-size: 1rem; }
        .dados-linha { display: flex; justify-content: space-between; margin: 8px 0; font-size: 0.85rem; color: #ccc; }
        .dado-valor { color: #fff; font-weight: bold; }
        .uso-dicas { color: #ffff00; font-weight: bold; }

        /* --- NOVO: LOG TÁTICO DETALHADO --- */
        .log-container {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin-top: 30px;
        }
        
        .log-titulo {
            color: #00ff41; border-bottom: 2px solid #00ff41; padding-bottom: 10px; margin-bottom: 20px; font-size: 1.2rem;
        }

        .log-caso-box { margin-bottom: 30px; }
        .log-caso-header { color: #ffff00; font-weight: bold; margin-bottom: 10px; border-left: 3px solid #ffff00; padding-left: 10px; }

        .log-item {
            background: #111; padding: 10px; margin-bottom: 5px; border-left: 3px solid #555; font-size: 0.9rem;
        }
        .log-acerto { border-left-color: #00ff41; }
        .log-erro { border-left-color: #ff4d4d; }

        .log-pergunta { color: #fff; font-weight: bold; margin-bottom: 5px; }
        .log-resposta { color: #aaa; }
        .log-correcao { color: #ff4d4d; margin-top: 3px; }
        .log-feedback { color: #ffff00; font-style: italic; font-size: 0.8rem; margin-top: 2px; }

        /* Botões */
        .barra-acoes { margin-top: 50px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        button { padding: 15px 25px; font-size: 1rem; cursor: pointer; text-transform: uppercase; font-weight: bold; background: transparent; border: 1px solid; transition: 0.3s; }
        
        .btn-txt { border-color: #00ff41; color: #00ff41; }
        .btn-txt:hover { background: #00ff41; color: #000; }
        .btn-reiniciar { border-color: #ff4d4d; color: #ff4d4d; }
        .btn-reiniciar:hover { background: #ff4d4d; color: #000; }

        @media print {
            header, footer, .intro-missao, .barra-acoes { display: none; }
            body { background: #fff !important; color: #000 !important; }
            .card-caso, .log-container, .log-item { border: 1px solid #000; color: #000; background: none; }
            .resumo-patente { border: 2px solid #000; }
            .stats-extra, .log-feedback { color: #000 !important; }
        }
    </style>
</head>
<body>

    <main class="dashboard">
        <section class="intro-missao">
            <h2>RELATÓRIO DE INTELIGÊNCIA</h2>
            <p>Consolidação dos dados operacionais da Agência.</p>
        </section>

        <div id="loading" style="text-align: center; padding: 50px;">Carregando Dossiê...</div>

        <div id="painel-conteudo" class="painel-global" style="display: none;">
            
            <div class="resumo-patente">
                <p style="color:#00ff41; font-size:0.9rem; letter-spacing:2px;">STATUS DO AGENTE</p>
                <div id="patente-texto" class="titulo-patente">AGENTE</div>
                
                <div style="margin-top: 10px; font-size: 1.4rem;">
                    EFICIÊNCIA GLOBAL: <span id="eficiencia-valor" style="color:#fff;">0%</span>
                </div>

                <div class="stats-extra">
                    <div>
                        TEMPO TOTAL:<br>
                        <span id="tempo-total-global" style="color:#00ff41; font-size:1.1rem; font-weight:bold;">0m 0s</span>
                    </div>
                    <div>
                        DICAS TOTAIS:<br>
                        <span id="total-dicas-global" style="color:#ffff00; font-size:1.1rem; font-weight:bold;">0</span>
                    </div>
                </div>
            </div>

            <h3 style="color:#00ff41; border-bottom:1px solid #333; padding-bottom:10px;">RESUMO DAS MISSÕES</h3>
            <div id="grid-cards" class="grid-historico"></div>

            <div class="log-container">
                <div class="log-titulo">LOG TÁTICO DETALHADO (PERGUNTA A PERGUNTA)</div>
                <div id="log-conteudo">
                    </div>
            </div>

            <div class="barra-acoes">
                <button onclick="window.print()" style="border-color:#00ffff; color:#00ffff;">🖨️ IMPRIMIR TELA</button>
                <button onclick="gerarRelatorioTXT()" class="btn-txt">💾 BAIXAR RELATÓRIO COMPLETO (.TXT)</button>
                <button onclick="encerrarJornada()" class="btn-reiniciar">❌ ENCERRAR SESSÃO</button>
            </div>
        </div>
    </main>

    <script src="componentes.js"></script>
    <script src="script.js"></script>
    <script src="final.js"></script>
</body>
</html>
